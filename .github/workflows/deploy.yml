name: deploy vers OVH

on:
  workflow_run:
    workflows: ["build react"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: telecharger l artefact du build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: deployer vers OVH
        uses: guitdev/ovhcloud-deploy-hosting-action@v1.1.1
        with:
          ftp_server: ${{ secrets.OVH_FTP_SERVER }}
          ftp_username: ${{ secrets.OVH_FTP_USERNAME }}
          ftp_password: ${{ secrets.OVH_FTP_PASSWORD }}
          local_dir: ./dist
          remote_dir: ./
          delete: true
